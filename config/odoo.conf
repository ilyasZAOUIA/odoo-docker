[options]
; Base de données
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_password_change_me

; Modules
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Logs
log_level = info
logfile = False

; Réseau
http_port = 8069
http_interface = 0.0.0.0

; Performance
workers = 0
max_cron_threads = 1
